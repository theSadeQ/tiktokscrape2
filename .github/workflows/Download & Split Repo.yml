name: Download & Split Repo

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "GitHub repo (OWNER/REPO)"
        required: true
        default: "torvalds/linux"

jobs:
  split-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install progress tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pv

      - name: Set variables
        run: |
          echo "TARGET_REPO=${{ github.event.inputs.target_repo }}" >> $GITHUB_ENV
          echo "REPO_NAME=$(basename ${{ github.event.inputs.target_repo }})" >> $GITHUB_ENV
          echo "TAG=split-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Clone repository
        run: |
          echo "Cloning $TARGET_REPO..."
          git clone --depth=1 https://github.com/${TARGET_REPO}.git
          echo "Clone finished."

      - name: Archive repository
        run: |
          echo "Creating archive..."
          tar -czf repo.tar.gz ${REPO_NAME}
          echo "Archive size:"
          ls -lh repo.tar.gz

      - name: Split archive with progress
        run: |
          echo "Splitting archive into 1GB chunks..."
          SIZE=$(stat -c%s repo.tar.gz)

          pv -s $SIZE repo.tar.gz | split -b 1024M - repo.part-

          echo "Chunks created:"
          ls -lh repo.part-*

      - name: Create release and upload parts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Split Repo (${{ env.TAG }})"
          files: repo.part-*

      - name: Generate download URL list
        run: |
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          echo "# Download URLs" > blob_urls.txt
          echo "" >> blob_urls.txt

          for f in repo.part-*; do
            echo "${RELEASE_URL}/${f}" >> blob_urls.txt
          done

          cat blob_urls.txt

      - name: Upload URL list
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: blob_urls.txt
